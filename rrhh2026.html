<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal RRHH Moderno</title>
  <!-- Fuente ejecutiva -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <!-- Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: #f4f6f9;
      color: #333;
    }
    header {
      background: #1f3c88;
      color: #fff;
      padding: 1rem 2rem;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    main {
      display: flex;
      flex-wrap: wrap;
      padding: 1rem;
      gap: 1rem;
    }
    aside {
      flex: 1 1 250px;
      max-width: 300px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      padding: 1rem;
      height: fit-content;
    }
    aside input {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 1rem;
    }
    aside ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    aside li {
      padding: 0.6rem;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.3s;
    }
    aside li:hover {
      background: #e9eef7;
    }
    section {
      flex: 3 1 600px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    section img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    section h2 {
      margin: 0.5rem 0;
      font-size: 1.4rem;
      color: #1f3c88;
    }
    section p {
      margin: 0.3rem 0;
      font-size: 1rem;
    }
    /* Dashboard */
    .dashboard {
      flex: 1 1 100%;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      padding: 2rem;
      margin-top: 1rem;
    }
    .dashboard h3 {
      margin-bottom: 1rem;
      color: #1f3c88;
      text-align: center;
    }
    .chart-container {
      display: none;
    }
    .chart-container.active {
      display: block;
    }
    .selector {
      text-align: center;
      margin-bottom: 1rem;
    }
    .selector button {
      margin: 0 0.5rem;
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 6px;
      background: #1f3c88;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s;
    }
    .selector button:hover {
      background: #3c5fa8;
    }
    @media(max-width: 768px) {
      main {
        flex-direction: column;
      }
      aside {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <header><i class="fa-solid fa-users"></i> Portal de RRHH</header>
  <main>
    <aside>
      <input type="text" id="search" placeholder="Buscar empleado...">
      <ul id="employeeList"></ul>
    </aside>
    <section id="employeeDetail">
      <img src="https://via.placeholder.com/120" alt="Foto empleado">
      <h2>Selecciona un empleado</h2>
      <p>La información aparecerá aquí</p>
    </section>
    <!-- Dashboard con selector -->
    <div class="dashboard">
      <h3>Métricas de RRHH</h3>
      <div class="selector">
        <button onclick="showChart('gerencia')">Gerencia</button>
        <button onclick="showChart('grupo')">Grupo</button>
        <button onclick="showChart('genero')">Género</button>
      </div>
      <div id="gerenciaChartContainer" class="chart-container active">
        <canvas id="gerenciaChart"></canvas>
      </div>
      <div id="grupoChartContainer" class="chart-container">
        <canvas id="grupoChart"></canvas>
      </div>
      <div id="generoChartContainer" class="chart-container">
        <canvas id="generoChart"></canvas>
      </div>
    </div>
  </main>

  <script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS-2kRZP0cXJV92YzCUw0Mkjkl-_l8Y7OM2VHkl7Wxr3qorbtGkk0O1InjMMMWzkPRorZUiJum7rL-4/pub?gid=0&single=true&output=csv";
    let employees = [];

    fetch(sheetUrl)
      .then(res => res.text())
      .then(data => {
        const rows = data.split("\n").map(r => r.split(/,|;/));
        const headers = rows[0].map(h => h.trim());
        employees = rows.slice(1).map(r => {
          let obj = {};
          headers.forEach((h, i) => obj[h] = r[i]);
          return obj;
        });
        renderList(employees);
        renderDashboard(employees);
      });

    function renderList(data) {
      const list = document.getElementById("employeeList");
      list.innerHTML = "";
      data.forEach(emp => {
        const li = document.createElement("li");
        li.textContent = emp["Nombre"] || "Sin nombre";
        li.addEventListener("click", () => showDetail(emp));
        list.appendChild(li);
      });
    }

    function showDetail(emp) {
      const detail = document.getElementById("employeeDetail");
      detail.innerHTML = `
        <img src="${emp["Url"] || "https://via.placeholder.com/120"}" alt="Foto empleado">
        <h2>${emp["Nombre"]}</h2>
        <p><strong>Gerencia:</strong> ${emp["Gerencia"]}</p>
        <p><strong>Puesto:</strong> ${emp["Puesto"]}</p>
        <p><strong>Correo:</strong> <a href="mailto:${emp["Correo"]}">${emp["Correo"]}</a></p>
        <p><strong>Grupo:</strong> ${emp["Grupo"]}</p>
        <p><strong>Género:</strong> ${emp["Genero"]}</p>
      `;
    }

    document.getElementById("search").addEventListener("input", e => {
      const term = e.target.value.toLowerCase();
      const filtered = employees.filter(emp =>
        (emp["Nombre"] || "").toLowerCase().includes(term) ||
        (emp["Gerencia"] || "").toLowerCase().includes(term) ||
        (emp["Puesto"] || "").toLowerCase().includes(term)
      );
      renderList(filtered);
    });

    // ===== Dashboard con Chart.js =====
    function renderDashboard(data) {
      // Gerencia
      const gerencias = {};
      data.forEach(emp => {
        const g = emp["Gerencia"] || "Sin gerencia";
        gerencias[g] = (gerencias[g] || 0) + 1;
      });
      new Chart(document.getElementById("gerenciaChart"), {
        type: 'bar',
        data: {
          labels: Object.keys(gerencias),
          datasets: [{
            label: 'Número de empleados',
            data: Object.values(gerencias),
            backgroundColor: '#1f3c88'
